<script type="text/babel" data-type="module" id="systemPrompt-js">
window.getSystemPrompt = function() {
  return `You are an AI Travel Planner Agent for INDIAN travellers using the ReAct framework.

IMPORTANT: All costs MUST be in Indian Rupees (₹). Never use $ or USD.
If a search result shows prices in $, convert to ₹: price × 83 = ₹

STRICT FORMAT — EVERY RESPONSE:
Thought: [one sentence — what you are doing right now]
Action: [one tool name]
Action Input: [input for that tool]

OR when all research is done:
Thought: I now have all the information needed.
Final Answer:
[complete itinerary]

RULES:
- NEVER write Final Answer before completing ALL 4 web_search steps
- Action must be exactly: web_search, calculator, or save_itinerary
- One action per response, wait for Observation
- Max 8 total steps

RESEARCH ORDER:
1. web_search → flights trains from nearest city to destination INR price
2. web_search → specific budget hotels destination INR per night (real hotel names)
3. web_search → top attractions restaurants destination entry fees meal cost INR
4. web_search → nightlife activities destination entry fee INR
5. calculator → transport + hotel*nights + food*days*people + activities + nightlife + misc
6. Final Answer → complete itinerary in format below
7. save_itinerary → save the text

FINAL ANSWER FORMAT:
## [Trip Title] — [Duration] for [N] People | Budget: ₹[amount]

### How to Get There
- Option 1: [type] | [route] | [duration] | ₹[price] per person
- Option 2: [type] | [route] | [duration] | ₹[price] per person

### Where to Stay
- Option 1: [REAL hotel name] | [area] | ₹[per night]/night | Total: ₹[total]
- Option 2: [REAL hotel name] | [area] | ₹[per night]/night | Total: ₹[total]

### Day-by-Day Itinerary
**Day 1 — [Theme]**
- Morning: [activity + place]
- Afternoon: [activity + place]
- Evening: [activity + place]
- Dinner: [REAL restaurant name] — ₹[cost]
- Overnight: [hotel]
[Repeat for every day]

### Budget Breakdown
| Category | Cost (₹) |
|---|---|
| Transport (total) | ₹ |
| Accommodation (total) | ₹ |
| Food (total) | ₹ |
| Activities & entry fees | ₹ |
| Nightlife & drinks | ₹ |
| Local transport | ₹ |
| Miscellaneous | ₹ |
| **TOTAL** | **₹** |
| **Remaining from budget** | **₹** |

### Must-Visit Places
- **[Place]** — [description] | Entry: ₹[fee or Free]

### Travel Tips
1. [tip]
2. [tip]
3. [tip]
4. [tip]
5. [tip]`;
};
</script>

<script type="text/babel" data-type="module" id="agentRunner-js">
window.AgentRunner = {
  parseResponse(text) {
    const lines = text.split('\n');
    let thought = '', action = '', actionInput = '', finalAnswer = '';
    let inFinal = false, finalLines = [];
    for (let i = 0; i < lines.length; i++) {
      const s = lines[i].trim();
      if (s.startsWith('Thought:') && !inFinal)      thought = s.replace('Thought:', '').trim();
      else if (s.startsWith('Action:') && !inFinal)  action  = s.replace('Action:', '').trim();
      else if (s.startsWith('Action Input:') && !inFinal) actionInput = s.replace('Action Input:', '').trim();
      else if (s.startsWith('Final Answer:')) {
        inFinal = true;
        const rem = s.replace('Final Answer:', '').trim();
        if (rem) finalLines.push(rem);
      } else if (inFinal) {
        if (s.toLowerCase().includes('remember to save_itinerary')) break;
        finalLines.push(lines[i]);
      }
    }
    if (finalLines.length) finalAnswer = finalLines.join('\n').trim();
    return { thought, action, actionInput, finalAnswer };
  },

  async callLLM(messages) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: window.getSystemPrompt(),
        messages
      })
    });
    const data = await res.json();
    return data.content?.map(b => b.text || '').join('') || '';
  },

  async webSearch(query) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        messages: [{
          role: 'user',
          content: `Simulate a web search for Indian travel planning.
Query: "${query}"
Return realistic, specific results with REAL hotel/restaurant names, actual INR prices, specific details about India.
Max 180 words. Be specific — include names, costs, times.`
        }]
      })
    });
    const d = await res.json();
    return d.content?.[0]?.text || 'No results.';
  },

  evalCalc(expr) {
    try {
      const clean = expr
        .replace(/[₹$€,]/g, '')
        .replace(/[a-zA-Z_]+/g, '')
        .replace(/[^0-9+\-*\/().\s]/g, '')
        .trim();
      const result = Function('"use strict"; return (' + clean + ')')();
      return `Result: ${Math.round(result)}`;
    } catch { return 'Error: Could not evaluate.'; }
  },

  downloadItinerary(text) {
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `yatra_itinerary_${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
    return 'Itinerary downloaded successfully.';
  },

  async executeTool(action, input) {
    if (action === 'web_search')    return await this.webSearch(input);
    if (action === 'calculator')    return this.evalCalc(input);
    if (action === 'save_itinerary') return this.downloadItinerary(input);
    return 'Unknown tool.';
  }
};
</script>

<script type="text/babel" data-type="module" id="markdownRenderer-js">
window.renderMarkdown = function(text) {
  let html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    // tables
    .replace(/\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+)/g, (_, head, body) => {
      const ths = head.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
      const rows = body.trim().split('\n').map(row => {
        const tds = row.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
        return `<tr>${tds}</tr>`;
      }).join('');
      return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
    })
    .replace(/^## (.+)$/gm,  '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^[-•] (.+)$/gm, '<li>$1</li>')
    .replace(/((<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
    .replace(/\n\n(?!<)/g, '</p><p>');
  return '<p>' + html + '</p>';
};
</script>

<script type="text/babel" id="StepCard-jsx">
const STEP_CONFIG = {
  thought:  { label: 'Thought',     icon: '💭', bgVar: '--thought-bg', bdrVar: '--thought-bdr', color: 'var(--blue)'   },
  action:   { label: 'Action',      icon: '⚡', bgVar: '--action-bg',  bdrVar: '--action-bdr',  color: 'var(--green)'  },
  obs:      { label: 'Observation', icon: '👁', bgVar: '--obs-bg',     bdrVar: '--obs-bdr',     color: 'var(--yellow)' },
  final:    { label: 'Itinerary',   icon: '✨', bgVar: '--final-bg',   bdrVar: '--final-bdr',   color: 'var(--accent)' },
  'user-msg':{ label: 'Request',    icon: '👤', bgVar: '--accent-glow',bdrVar: '--border-hi',   color: 'var(--accent2)'},
};

const StepCard = ({ type, content, stepNum, toolName }) => {
  const cfg = STEP_CONFIG[type] || STEP_CONFIG.thought;

  const s = {
    wrapper: {
      padding: '4px 0',
      animation: 'fadeUp 0.35s ease both',
    },
    card: {
      borderRadius: 'var(--radius)',
      padding: '14px 18px',

      background: `var(${cfg.bgVar})`,

    },

      color: cfg.color,
    },
    badge: {
      background: cfg.color, color: 'var(--bg)',
      padding: '1px 6px', borderRadius: 3,
      fontSize: 9, letterSpacing: 1, opacity: 0.85,
    },
    stepNum: {
      marginLeft: 'auto',
      fontFamily: "'DM Mono', monospace",
      fontSize: 10, color: 'var(--text-dimmer)',
    },

      fontSize: 14, lineHeight: 1.72,
      color: 'var(--text)',
      whiteSpace: type === 'action' ? 'nowrap' : 'pre-wrap',
      overflowX: type === 'action' ? 'auto' : 'visible',
      fontFamily: type === 'action' ? "'DM Mono', monospace" : "'Plus Jakarta Sans', sans-serif",
      ...(type === 'action' && { fontSize: 12, color: 'var(--text-dim)' }),
    },
    finalBody: { fontSize: 14, lineHeight: 1.75 },
  };

  // Final answer uses HTML renderer
  if (type === 'final') {
    return (
      <div style={s.wrapper}>
        <div style={s.card}>
          <div style={s.labelRow}>
            <span>{cfg.icon}</span>
            <span style={s.labelText}>{cfg.label}</span>
            {stepNum != null && <span style={s.stepNum}>step {stepNum}</span>}
          </div>
          <div
            style={s.finalBody}
            className="final-rendered"
            dangerouslySetInnerHTML={{ __html: window.renderMarkdown(content) }}
          />
        </div>
      </div>
    );
  }

  const displayLabel = toolName || cfg.label;

  return (
    <div style={s.wrapper}>
      <div style={s.card}>
        <div style={s.labelRow}>
          <span>{cfg.icon}</span>
          <span style={s.labelText}>{displayLabel}</span>
          {type === 'action' && toolName && <span style={s.badge}>{toolName.replace('_',' ')}</span>}
          {stepNum != null && <span style={s.stepNum}>step {stepNum}</span>}
        </div>
        <div style={s.body}>{content}</div>
      </div>
    </div>
  );
};
window.StepCard = StepCard;
</script>

<script type="text/babel" id="InputArea-jsx">
const { useRef } = React;

const SendIcon = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth="2.3" strokeLinecap="round" strokeLinejoin="round">
    <line x1="22" y1="2" x2="11" y2="13"/>
    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
  </svg>
);

const InputArea = ({ value, onChange, onSend, disabled }) => {
  const [focused, setFocused] = React.useState(false);
  const ref = useRef(null);

  const autoResize = () => {
    if (ref.current) {
      ref.current.style.height = 'auto';
      ref.current.style.height = Math.min(ref.current.scrollHeight, 140) + 'px';
    }
  };

  const handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onSend(); }
  };

  const s = {
    wrap: { padding: '18px 48px 26px', borderTop: '1px solid var(--border)', background: 'var(--bg)' },
    inputWrap: {
      display: 'flex', gap: 12, alignItems: 'flex-end',
      background: 'var(--bg2)',
      border: `1px solid ${focused ? 'var(--border-hi)' : 'var(--border)'}`,
      borderRadius: 20, padding: '12px 14px',
      boxShadow: focused ? '0 0 0 3px var(--accent-glow)' : 'none',
      transition: 'all 0.25s',
    },
    textarea: {
      flex: 1, background: 'none', border: 'none', outline: 'none',
      color: 'var(--text)', fontFamily: "'Plus Jakarta Sans', sans-serif",
      fontSize: 15, lineHeight: 1.6, resize: 'none',
      maxHeight: 140, minHeight: 24,
    },
    btn: {
      width: 42, height: 42, borderRadius: 12,
      background: disabled
        ? 'var(--bg3)'
        : 'linear-gradient(135deg, var(--accent), var(--accent2))',
      border: 'none', cursor: disabled ? 'not-allowed' : 'pointer',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      color: disabled ? 'var(--text-dimmer)' : 'white',
      transition: 'all 0.2s', flexShrink: 0,
      opacity: disabled ? 0.5 : 1,
    },
    hint: {
      display: 'flex', gap: 18, marginTop: 10,
      fontFamily: "'DM Mono', monospace", fontSize: 11, color: 'var(--text-dimmer)',
    },
    kbd: {
      background: 'var(--bg3)', border: '1px solid var(--border)',
      padding: '1px 5px', borderRadius: 4, fontSize: 10,
      fontFamily: "'DM Mono', monospace",
    },
    hintItem: { display: 'flex', alignItems: 'center', gap: 4 },
  };

  return (
    <div style={s.wrap}>
      <div style={s.inputWrap}>
        <textarea
          ref={ref}
          style={s.textarea}
          value={value}
          onChange={e => { onChange(e.target.value); autoResize(); }}
          onKeyDown={handleKey}
          onFocus={() => setFocused(true)}
          onBlur={() => setFocused(false)}
          placeholder="Where do you want to go? Include destination, duration, budget, and number of travellers…"
          rows={1}
        />
        <button style={s.btn} onClick={onSend} disabled={disabled}>
          <SendIcon/>
        </button>
      </div>
      <div style={s.hint}>
        <span style={s.hintItem}><kbd style={s.kbd}>Enter</kbd> send</span>
        <span style={s.hintItem}><kbd style={s.kbd}>Shift</kbd>+<kbd style={s.kbd}>Enter</kbd> newline</span>
        <span style={s.hintItem}>All prices in ₹</span>
      </div>
    </div>
  );
};
window.InputArea = InputArea;
</script>

<script type="text/babel" id="App-jsx">
const { useState, useCallback } = React;

const TOOL_LABELS = {
  web_search:     '🔍 Web Search',
  calculator:     '🧮 Calculator',
  save_itinerary: '💾 Save Itinerary',
};

const App = () => {
  const [theme, setTheme]           = useState('dark');
  const [input, setInput]           = useState('');
  const [steps, setSteps]           = useState([]);
  const [thinking, setThinking]     = useState(null);
  const [status, setStatus]         = useState('idle');
  const [running, setRunning]       = useState(false);
  const [history, setHistory]       = useState([]);
  const [currentStep, setCurrentStep] = useState(0);
  const [showWelcome, setShowWelcome] = useState(true);

  const toggleTheme = () => {
    const next = theme === 'dark' ? 'light' : 'dark';
    setTheme(next);
    document.documentElement.dataset.theme = next;
  };

  const addStep = useCallback((type, content, stepNum, toolName) => {
    setSteps(prev => [...prev, { type, content, stepNum, toolName }]);
  }, []);

  const fillPrompt = (text) => {
    setInput(text);
  };

  const sendMessage = async () => {
    if (!input.trim() || running) return;
    const userText = input.trim();

    setRunning(true);
    setInput('');
    setShowWelcome(false);
    setSteps([]);
    setStatus('running');
    setCurrentStep(0);
    setHistory(prev => [userText.slice(0, 55) + (userText.length > 55 ? '…' : ''), ...prev].slice(0, 8));

    addStep('user-msg', userText, null, null);

    const messages = [{ role: 'user', content: userText }];
    const MAX_STEPS = 10;

    for (let i = 0; i < MAX_STEPS; i++) {
      const stepNum = i + 1;
      setCurrentStep(stepNum);
      setThinking('Thinking…');

      let llmText;
      try {
        llmText = await window.AgentRunner.callLLM(messages);
      } catch (err) {
        setThinking(null);
        addStep('obs', `Error: ${err.message}`, stepNum, null);
        break;
      }

      setThinking(null);

      const { thought, action, actionInput, finalAnswer } = window.AgentRunner.parseResponse(llmText);

      if (thought) addStep('thought', thought, stepNum, null);

      if (finalAnswer) {
        addStep('final', finalAnswer, stepNum, null);
        window.AgentRunner.downloadItinerary(finalAnswer);
        setStatus('done');
        break;
      }

      if (action) {
        const toolLabel = TOOL_LABELS[action] || action;
        addStep('action', `${action}("${actionInput}")`, stepNum, toolLabel);
        setThinking(`Running ${action}…`);

        let obs;
        try {
          obs = await window.AgentRunner.executeTool(action, actionInput);
        } catch (e) {
          obs = `Tool error: ${e.message}`;
        }

        setThinking(null);
        addStep('obs', obs, stepNum, null);

        messages.push({ role: 'assistant', content: llmText });
        messages.push({ role: 'user', content: `Observation: ${obs}` });
      } else {
        messages.push({
          role: 'user',
          content: 'Invalid action. Continue with: Thought / Action / Action Input.',
        });
      }
    }

    setRunning(false);
    if (status !== 'done') setStatus('idle');
  };

  const s = {
    app: {
      height: '100vh', display: 'flex', flexDirection: 'column',
      position: 'relative', overflow: 'hidden',
    },
    body: {
      flex: 1, display: 'flex', overflow: 'hidden', position: 'relative', zIndex: 1,
    },
    main: {
      flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden',
    },
  };

  return (
    <div style={s.app}>
      <AmbientBackground/>
      <Header theme={theme} onToggleTheme={toggleTheme} status={status}/>
      <div style={s.body}>
        <Sidebar onFillPrompt={fillPrompt} history={history}/>
        <main style={s.main}>
          <ProgressPips total={8} current={currentStep} visible={running || status === 'done'}/>
          <AgentFeed
            steps={steps}
            thinking={thinking}
            showWelcome={showWelcome}
            onFillPrompt={fillPrompt}
          />
          <InputArea
            value={input}
            onChange={setInput}
            onSend={sendMessage}
            disabled={running}
          />
        </main>
      </div>
    </div>
  );
};
window.App = App;
</script>
